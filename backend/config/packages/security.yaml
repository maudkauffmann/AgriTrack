security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: telUtilisateur

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/login
            stateless: false
            context: shared_auth # <--- Partage l'authentification avec 'main'
            json_login:
                check_path: /api/login
                username_path: telUtilisateur
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # firewall dédié à React (API)
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        # firewall pour EasyAdmin
        main:
            lazy: true
            context: shared_auth # <--- Doit être identique à celui du dessus
            provider: app_user_provider
            entry_point: form_login
            form_login:
                login_path: app_login    # Route de ta page de login HTML
                check_path: app_login
                enable_csrf: true
            logout:
                path: app_logout
            custom_authenticator: App\Security\AppAuthenticator

    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api,       roles: IS_AUTHENTICATED_FULLY } # Sécurise tout le reste de l'API
        - { path: ^/admin,     roles: ROLE_ADMIN }
        - { path: ^/login,     roles: PUBLIC_ACCESS }
